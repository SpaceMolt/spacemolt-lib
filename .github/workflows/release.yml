name: Release

# Cuts a semver release when main changes. True semver, honest about breakage:
# the bump level is computed programmatically (scripts/classify-bump.ts) from the
# generated command/notification surface diff since the last tag, plus
# conventional commits for the hand-written layer. major = a consumer's code
# breaks — and it is expected to climb fast, because the command surface tracks a
# live server. A high major IS the stability signal, not an embarrassment.
#
# Triggers:
# - push to main: hand-written changes merged via PR.
# - workflow_run after a spec sync: the sync commits via GITHUB_TOKEN, which by
#   design does NOT fire a push event, so we hook its completion instead.
# - workflow_dispatch: manual.
#
# Publishes to npm via trusted publishing (OIDC) — no long-lived NPM_TOKEN.
# The version bump commit is pushed with GITHUB_TOKEN, which does not
# re-trigger workflows, so there is no release loop.

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ['Sync OpenAPI spec']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # On the workflow_run trigger, only proceed if the spec sync actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # NO registry-url here: that input makes setup-node write an .npmrc with
      # an `_authToken=${NODE_AUTH_TOKEN}` line, and any configured token —
      # even one pointing at an unset env var — preempts npm's OIDC trusted
      # publishing. npm then publishes token-style with no usable credential
      # and the registry masks the rejection as `E404 PUT .../@spacemolt/lib`.
      # (Symptom check: a working trusted publish logs "... and provenance".)
      - name: Setup Node (for npm trusted publishing)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node's bundled npm is older.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Self-heal a tagged-but-unpublished version. The release step below
      # early-exits when the tag already exists, so a version whose npm publish
      # failed (or was interrupted) would otherwise never reach the registry —
      # tags and GitHub Releases run ahead of npm silently. Repairs v7.1.0 and
      # any future stranded release on the next run.
      - name: Publish tagged version missing from npm
        run: |
          set -euo pipefail
          CURRENT=$(jq -r .version package.json)
          if ! git rev-parse "v${CURRENT}" >/dev/null 2>&1; then
            echo "No tag v${CURRENT}; nothing to repair."
            exit 0
          fi
          PUBLISHED=$(npm view "@spacemolt/lib@${CURRENT}" version 2>/dev/null || true)
          if [ "${PUBLISHED}" = "${CURRENT}" ]; then
            echo "npm already has ${CURRENT}; nothing to repair."
            exit 0
          fi
          echo "v${CURRENT} is tagged but missing from npm — publishing it."
          bun run build
          npm publish

      - name: Classify version bump
        id: classify
        run: |
          bun run scripts/classify-bump.ts > /tmp/classify.json
          cat /tmp/classify.json
          echo "level=$(jq -r .level /tmp/classify.json)" >> "$GITHUB_OUTPUT"
          echo "next=$(jq -r .next /tmp/classify.json)" >> "$GITHUB_OUTPUT"

      - name: Quality gate
        if: steps.classify.outputs.level != 'none'
        run: bun run check

      - name: Apply version, tag, and release
        id: release
        if: steps.classify.outputs.level != 'none'
        env:
          NEXT: ${{ steps.classify.outputs.next }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git rev-parse "v${NEXT}" >/dev/null 2>&1; then
            echo "Tag v${NEXT} already exists; nothing to release."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Set package.json version to NEXT. On the initial release this is a
          # no-op (package.json already holds the seed version), so we only commit
          # when something actually changed.
          bun -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf-8'));j.version=process.env.NEXT;fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');"
          git add package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): v${NEXT}"
            git push origin HEAD:main
          fi

          {
            echo "Released by .github/workflows/release.yml."
            echo
            echo "Generated command surface: $(jq -r '.specVersion // "n/a"' /tmp/classify.json)"
            echo
            echo "Why this bump (level: $(jq -r .level /tmp/classify.json)):"
            jq -r '.reasons[] | "- " + .' /tmp/classify.json
          } > /tmp/notes.md

          git tag -a "v${NEXT}" -m "v${NEXT}"
          git push origin "v${NEXT}"
          gh release create "v${NEXT}" --title "v${NEXT}" --notes-file /tmp/notes.md

          bun run build
          npm publish
          # Mark a real publish so the Discord step only fires when we actually
          # shipped (the tag-already-exists branch above exits before this).
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Announce release to Discord (#patch-notes)
        # Only on a genuine publish; a failed webhook must never fail a shipped release.
        if: steps.release.outputs.published == 'true'
        continue-on-error: true
        env:
          NEXT: ${{ steps.classify.outputs.next }}
          LEVEL: ${{ steps.classify.outputs.level }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set; skipping Discord notification."
            exit 0
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${NEXT}"

          # Reuse the classifier output already on disk: specVersion (the gameserver
          # build this command surface matches) + reasons[] (the concise per-change
          # changelog). Show the first few reasons and link the release for the rest.
          PAYLOAD=$(jq \
            --arg title "SpaceMolt Lib v${NEXT} Released" \
            --arg url "$RELEASE_URL" \
            --arg level "$LEVEL" \
            '
            (.specVersion // "n/a") as $spec
            | (.reasons // []) as $all
            | ($all[0:6]) as $shown
            | ( "Command surface updated for gameserver \($spec) (\($level) release).\n\n"
                + ($shown | map("• " + .) | join("\n"))
                + (if ($all | length) > ($shown | length)
                   then "\n• …and \(($all | length) - ($shown | length)) more"
                   else "" end)
                + "\n\n[Full changelog & install](\($url))"
              ) as $desc
            | { embeds: [ {
                title: $title,
                url: $url,
                description: $desc,
                color: 16744256,
                footer: { text: "SpaceMolt DevTeam" }
              } ] }
            ' /tmp/classify.json)

          HTTP_CODE=$(curl -sS -o /tmp/discord_resp.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Discord webhook failed: HTTP $HTTP_CODE" >&2
            cat /tmp/discord_resp.txt >&2
            exit 1
          fi
          echo "Discord notification sent."
